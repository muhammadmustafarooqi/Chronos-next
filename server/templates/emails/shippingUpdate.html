<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
</head>
<body style="margin: 0; padding: 0; background-color: #f4f4f4; font-family: Arial, sans-serif;">
    <table width="100%" cellpadding="0" cellspacing="0" style="background-color: #f4f4f4;">
        <tr>
            <td align="center">
                <table width="600" cellpadding="0" cellspacing="0" style="background-color: #ffffff; max-width: 600px; margin: 20px auto; border-radius: 4px; overflow: hidden; box-shadow: 0 4px 10px rgba(0,0,0,0.05);" bgcolor="#ffffff">
                    <!-- HEADER -->
                    <tr>
                        <td align="center" style="padding: 40px 20px; border-bottom: 2px solid #D4AF37;" bgcolor="#0a0a0a">
                            <h1 style="color: #ffffff; font-family: 'Times New Roman', Times, serif; font-size: 28px; margin: 0; letter-spacing: 2px;">CHRONOS</h1>
                            <p style="color: #D4AF37; margin: 5px 0 0 0; font-size: 12px; letter-spacing: 1px;">LUXURY TIMEPIECES</p>
                        </td>
                    </tr>
                    
                    <!-- CONTENT -->
                    <tr>
                        <td style="padding: 40px 30px; color: #333333;" bgcolor="#ffffff">
                            <h2 style="margin-top: 0; font-size: 22px; color: #111111;">Shipping Update</h2>
                            <p style="font-size: 16px; line-height: 1.6; color: #555555;">Hello {{customerName}},</p>
                            <p style="font-size: 16px; line-height: 1.6; color: #555555;">Your order <strong>{{orderId}}</strong> has been updated.</p>
                            
                            <table width="100%" cellpadding="0" cellspacing="0" style="margin: 30px 0;">
                                <tr>
                                    <td align="center" style="padding: 20px; border: 1px solid #D4AF37; background-color: #fdfbf5;" bgcolor="#fdfbf5">
                                        <p style="margin: 0; font-size: 14px; color: #777777; text-transform: uppercase; letter-spacing: 1px;">Current Status</p>
                                        <h3 style="margin: 10px 0 0 0; font-size: 24px; color: #D4AF37;">{{stage}}</h3>
                                    </td>
                                </tr>
                            </table>

                            <p style="font-size: 16px; line-height: 1.6; color: #555555;"><em>{{note}}</em></p>

                            <div style="text-align: center; margin-top: 40px;">
                                <a href="{{trackingUrl}}" style="display: inline-block; padding: 14px 28px; background-color: #0a0a0a; color: #ffffff; text-decoration: none; font-weight: bold; border-radius: 4px; font-size: 14px;">Track Order</a>
                            </div>
                        </td>
                    </tr>
                    
                    <!-- FOOTER -->
                    <tr>
                        <td align="center" style="padding: 30px; background-color: #f9f9f9; border-top: 1px solid #eeeeee;" bgcolor="#f9f9f9">
                            <p style="font-size: 12px; color: #999999; margin: 0;">© 2026 Chronos Timepieces. All rights reserved.</p>
                            <p style="font-size: 12px; margin: 10px 0 0 0;"><a href="#" style="color: #D4AF37; text-decoration: underline;">Unsubscribe</a></p>
                        </td>
                    </tr>
                </table>
            </td>
        </tr>
    </table>
</body>
</html>
